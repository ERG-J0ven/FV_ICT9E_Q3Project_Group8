    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-image: url('https://www.wagnerreese.com/content/uploads/2023/04/Highways.jpg');
            background-size: cover;
            
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .box {
            background-color: #f3f1f1;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: left;
        }

        h2 { text-align: center; color: #0a0909; margin-top: 0; }
        
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #555; }

        select, input {
            width: 99%;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .result-area {
            background: #f9f9f9;
            padding: 15px;
            border-left: 5px solid #0c0909;
            margin-top: 10px;
        }

        .total-price { font-size: 1.5rem; font-weight: bold; color: #000; }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0b0909;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        button:hover { background-color: #333; }
    </style>
</head>
<body>

 <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">

          <a class="nav-link text-white" href="help.html">Help</a>

            <form class="d-flex">
        <button id="creation" class="btn btn-primary" type="button" href="registration.html">
          <a style="color: white; " href="registration.html">Create Account</a> 
        </button>
      </form>
    </div>
  </div>
</nav>

    <main>
        <div class="box">
            <h2> Fare Guide</h2>
            
             <label>Pickup:</label>
               <select class="form-control" id="pickup">
                <option value="0">North Avenue</option>
                <option value="2">Quezon Ave</option>
                 <option value="7">Cubao</option>
                <option value="13">Ayala</option>
                <option value="17">Taft Avenue</option>
            </select>

<label>Destination:</label>
                   <select class="form-control" id="dropoff">
                <option value="0">North Ave</option>
                <option value="2">Quezon Ave</option>
                <option value="7">Cubao</option>
                <option value="13">Ayala</option>
                 <option value="17" selected>Taft Avenue</option>
            </select>
 
              <label>Passenger opt:</label>
              <select class="form-control" id="discount">
                <option value="1">Regular</option>
                 <option value="0.8">Senior / PWD / Student (20% Off)</option>
            </select>

            <button onclick="calculateFare()">Calculate Fare</button>

            <div class="result-area">
                <span>Estimated Total Fare:</span>
                <div class="total-price" id="displayFare">₱ 0.00</div>
              </div>
           </div>
           </main>

    <footer id="foot">
        <p>Gavin Ruiz, Jarvis Joven, Raphael De Vera, 9-Emerald</p>
      </footer>
    <script>
        function calculateFare() {
            //   Rates 
            const baseFare = 50; 
            const perKM = 15;
            const baseKM = 2;

            // Get values 
            let start = parseFloat(document.getElementById('pickup').value);
             let end = parseFloat(document.getElementById('dropoff').value);
            let discountMultiplier = parseFloat(document.getElementById('discount').value);

           
             let distance = Math.abs(end - start);
            
            let finalFare = baseFare;

            // If distance is > 2KM, add the extra cost per km
            if (distance > baseKM) {
                finalFare += (distance - baseKM) * perKM;
            }

            // Apply Discount
            finalFare = finalFare * discountMultiplier;

            // Update UI
            document.getElementById('displayFare').innerText = "₱ " + finalFare.toFixed(2);
        }
    </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakay Fare Guide</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-image: url('https://www.wagnerreese.com/content/uploads/2023/04/Highways.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            min-height: 113vh;
        }

        header, footer {
            background-color: #080808;
            color: #faf2f2;
            padding: 15px 30px;
            text-align: center;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img { height: 40px; width: auto; }

        nav a { color: #fdf7f7; margin: 0 10px; text-decoration: none; font-size: 14px; }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .box {
            background-color: #f3f1f1;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: left;
        }

        h2 { text-align: center; color: #0a0909; margin-top: 0; }
        
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #555; }

        select, input {
            width: 99%;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .result-area {
            background: #f9f9f9;
            padding: 15px;
            border-left: 5px solid #0c0909;
            margin-top: 10px;
        }

        .total-price { font-size: 1.5rem; font-weight: bold; color: #000; }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0b0909;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        button:hover { background-color: #333; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="https://github.com/ERG-J0ven/FV_ICT9E_Q3Project_Group8/blob/main/ragaja.png?raw=true" alt="Logo">
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Schedule</a>
            <a href="#">Help</a>
        </nav>
    </header>

    <main>
        <div class="box">
            <h2> Fare Guide</h2>
            
             <label>Pickup:</label>
               <select id="pickup">
                <option value="0">North Avenue</option>
                <option value="2">Quezon Ave</option>
                 <option value="7">Cubao</option>
                <option value="13">Ayala</option>
                <option value="17">Taft Avenue</option>
            </select>

<label>Destination:</label>
                   <select id="dropoff">
                <option value="0">North Ave</option>
                <option value="2">Quezon Ave</option>
                <option value="7">Cubao</option>
                <option value="13">Ayala</option>
                 <option value="17" selected>Taft Avenue</option>
            </select>
 
              <label>Passenger opt:</label>
              <select id="discount">
                <option value="1">Regular</option>
                 <option value="0.8">Senior / PWD / Student (20% Off)</option>
            </select>

            <button onclick="calculateFare()">Calculate Fare</button>

            <div class="result-area">
                <span>Estimated Total Fare:</span>
                <div class="total-price" id="displayFare">₱ 0.00</div>
              </div>
           </div>
           </main>

    <footer>
        De Vera - Joven - Ruiz / 9 Emerald 2026 
    </footer>
    <script>
        function calculateFare() {
            //   Rates 
            const baseFare = 50; 
            const perKM = 15;
            const baseKM = 2;

            // Get values 
            let start = parseFloat(document.getElementById('pickup').value);
             let end = parseFloat(document.getElementById('dropoff').value);
            let discountMultiplier = parseFloat(document.getElementById('discount').value);

           
             let distance = Math.abs(end - start);
            
            let finalFare = baseFare;

            // If distance is > 2KM, add the extra cost per km
            if (distance > baseKM) {
                finalFare += (distance - baseKM) * perKM;
            }

            // Apply Discount
            finalFare = finalFare * discountMultiplier;

            // Update UI
            document.getElementById('displayFare').innerText = "₱ " + finalFare.toFixed(2);
        }
    </script>







</body>
</html>

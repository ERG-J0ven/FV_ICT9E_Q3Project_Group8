<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation page</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: #000;
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #000;
        }

        .buttons a {
            margin-left: 15px;
            text-decoration: none;
            color: #000;
            padding: 5px 10px;
            border: 1px solid #000;
        }

        
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .box {
            padding: 40px;
            border: 1px solid #000;
            max-width: 500px;
        }

        .box h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        
        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Logo</div>
        <nav>
             <a href="#">Home</a>
            <a href="#">Fare Matrix</a>
            <a href="#">Schedule</a>
            <a href="#">Help</a>
        </nav>
        <div class="buttons">
            <a href="#">Book Now</a>
            <a href="#">Create Account</a>
        </div>



    </header>

    <main>
        <div class="box">
         <h1>Your account has been created.</h1>
         <p>▼ Click here to verify an email</p>
            <a href="#">Verify email</a>
        </div>
    </main>

    <footer>
        De Vera / 9 Emerald 2026
    </footer>

</body>
</html>
